<div id="page-list"> 
	<div id="page-header">
		<div class="header">
			<div>
				<h4> Danh sách loại đối tác </h4>
			</div>
			<div class="actions">
				<lib-button 
					(onClick)="createOrUpdatePartnerType()" 
					iconType="create" 
                    label="Tạo loại đối tác"
				/>
			</div>
		</div>
	</div>
	
	<lib-table  
		[rows]="rows" 
		[isLoading]="isLoading" 
		[(page)]="page"
		[columns]="columns"
		[listAction]="listAction" 
		[columnCacheName]="'MainPartnerTypeComponent'" 
		(_onPageChange)="setPage()"
	>
		<lib-table-filter [items]="itemFilters" (_onChange)="setPage($event)" />
	</lib-table>
</div>
