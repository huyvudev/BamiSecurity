<lib-loading [(isSpinner)]="isLoading"></lib-loading>
<div id="page-content" class="page-detail">

    <div id="page-header">
        <div class="header mb-3">
            <div>
                <h4>Chỉnh sử OrderDetail</h4>
            </div>
            <div class="actions">
                <lib-button styleClass="ml-3 system-style p-button" (onClick)="back()" label="Quay lại"
                    icon="pi pi-angle-left">
                </lib-button>
            </div>
        </div>
        <lib-table-filter *ngIf="!isCreate" [items]="itemFilters" (_onChange)="getDetail($event.id)" />
    </div>

    <form class="form-wrapper" *ngIf="hasData" [formGroup]="postForm" (ngSubmit)="onSubmit()">

        <div class="btn-actions mt-3">
            <div class="flex justify-content-end">

                <ng-container>
                    <lib-button *ngIf="idDetailOrder && !isEdit" icon="pi pi-pencil" styleClass="system-style"
                        label="Chỉnh sửa" (onClick)="activeEdit()">
                    </lib-button>
                    <lib-button *ngIf="!idDetailOrder || isEdit" click type="btn-submit" label="Lưu" icon="pi pi-save"
                        styleClass="system-style p-button ml-3"></lib-button>
                    <lib-button *ngIf="isEdit || !idDetailOrder" styleClass="btn-cancel ml-2" label="Hủy"
                        (onClick)="cancel()">
                    </lib-button>
                </ng-container>

            </div>
        </div>

        <div class="grid m-0 ml-1">
            <div class="col-12 grid form-style">
                <div class="col-12 grid form-style">

                    <div class="field col-12 pb-0">
                        <h5 class="mb-0"> Thông tin cơ bản</h5>
                    </div>

                    <div class="field col-3">
                        <lib-inputText label="Type" placeholder="Nhập Type" formControlName="type">
                        </lib-inputText>
                    </div>

                    <div class="field col-3">
                        <lib-inputText label="Title" placeholder="T-shirt" formControlName="title">
                        </lib-inputText>
                    </div>


                    <div class="field col-3">
                        <lib-select [filter]="true" label="Sku" [options]="listSkus" optionLabel="code" optionValue="id"
                            placeholder="Sku" formControlName="skuId">
                        </lib-select>
                    </div>

                    <div class="field col-3">

                    </div>

                    <div class="field col-3">
                        <lib-inputText label="Color" placeholder="Red" formControlName="color">
                        </lib-inputText>
                    </div>


                    <div class="field col-3">
                        <lib-inputNumber label="Quantity" placeholder="Số lượng" formControlName="quantity">
                        </lib-inputNumber>
                    </div>
                    <div class="field col-6">

                    </div>

                    <div class="field col-3">
                        <lib-inputText label="Seller Sku" placeholder="Seller Sku" formControlName="sellerSku">
                        </lib-inputText>
                    </div>



                    <!--  -->
                    <div class="field col-12 pb-0">
                        <h5 class="mb-0"> Thiết kế</h5>
                    </div>

                    <div class="field col-6">
                        <lib-inputText label="Size" placeholder="10in" formControlName="size">
                        </lib-inputText>
                    </div>

                    <div class="field col-3">
                        <lib-inputNumber label="Width" placeholder="Nhập chiều rộng" formControlName="width">
                        </lib-inputNumber>
                    </div>

                    <div class="field col-3">
                        <lib-inputNumber label="Length" placeholder="Nhập chiều dài" formControlName="length">
                        </lib-inputNumber>
                    </div>


                    <div class="field col-6">
                        <label htmlFor="mainImg"> MockUp Front </label>
                        <div
                            class="image-zone-upload-boder  fix-height flex align-items-center justify-content-center mt-1">
                            <lib-image class="image-zone-upload max-w-27rem max-h-27rem"  [isShowImage]="true"
                                [src]="getMainImage('mockUpFront')" [imageDefault]="imageDefault">
                            </lib-image>
                        </div>

                        <p-fileUpload mode="basic" [disabled]="true" chooseLabel="Chọn ảnh" chooseIcon="pi pi-upload" name="input"
                            [auto]="true" url="{{uploadApi}}" accept="image/*" [maxFileSize]="maxSize"
                            (onUpload)="selectImg($event,'mockUpFront')" />
                    </div>

                    <div class="field col-6">
                        <label htmlFor="mainImg"> MockUp Back </label>
                        <div
                            class="image-zone-upload-boder  fix-height flex align-items-center justify-content-center mt-1">
                            <lib-image class="image-zone-upload"  [isShowImage]="true"
                                [src]="getMainImage('mockUpBack')" [imageDefault]="imageDefault">
                            </lib-image>
                        </div>

                        <p-fileUpload mode="basic" [disabled]="true" chooseLabel="Chọn ảnh" chooseIcon="pi pi-upload" name="input"
                            [auto]="true" url="{{uploadApi}}" accept="image/*" [maxFileSize]="maxSize"
                            (onUpload)="selectImg($event,'mockUpBack')" />
                    </div>

                    <!--  -->

                    <ng-container>

                        <div class="field col-6">
                            <label htmlFor="mainImg"> Sale Design Front</label>
                            <div
                                class="image-zone-upload-boder w-30rem fix-height flex align-items-center justify-content-center mt-1">
                                <lib-image class="image-zone-upload"  [isShowImage]="true"
                                    [src]="getMainImage('saleDesignFront')" [imageDefault]="imageDefault">
                                </lib-image>
                            </div>
    
                            <p-fileUpload mode="basic" [disabled]="true" chooseLabel="Chọn ảnh" chooseIcon="pi pi-upload" name="input"
                                [auto]="true" url="{{uploadApi}}" accept="image/*" [maxFileSize]="maxSize"
                                (onUpload)="selectImg($event,'saleDesignFront')" />
                        </div>

                        <div class="field col-6">
                            <label htmlFor="mainImg"> Design Front </label>
                            <div
                                class="image-zone-upload-boder w-30rem fix-height flex align-items-center justify-content-center mt-1">
                                <lib-image class="image-zone-upload"  [isShowImage]="true"
                                    [src]="getMainImage('designFront')" [imageDefault]="imageDefault">
                                </lib-image>
                            </div>
    
                            <p-fileUpload mode="basic" [disabled]="isDisableUpload" chooseLabel="Chọn ảnh" chooseIcon="pi pi-upload" name="input"
                                [auto]="true" url="{{uploadApi}}" accept="image/*" [maxFileSize]="maxSize"
                                (onUpload)="selectImg($event,'designFront')" />
                        </div>

                        <div class="field col-6">
                            <label htmlFor="mainImg"> Sale Design Back </label>
                            <div
                                class="image-zone-upload-boder w-30rem fix-height flex align-items-center justify-content-center mt-1">
                                <lib-image class="image-zone-upload"  [isShowImage]="true"
                                    [src]="getMainImage('saleDesignBack')" [imageDefault]="imageDefault">
                                </lib-image>
                            </div>
    
                            <p-fileUpload mode="basic" [disabled]="true" chooseLabel="Chọn ảnh" chooseIcon="pi pi-upload" name="input"
                                [auto]="true" url="{{uploadApi}}" accept="image/*" [maxFileSize]="maxSize"
                                (onUpload)="selectImg($event,'saleDesignBack')" />
                        </div>

                        <div class="field col-6">
                            <label htmlFor="mainImg"> Design Back </label>
                            <div
                                class="image-zone-upload-boder w-30rem fix-height flex align-items-center justify-content-center mt-1">
                                <lib-image class="image-zone-upload"  [isShowImage]="true"
                                    [src]="getMainImage('designBack')" [imageDefault]="imageDefault">
                                </lib-image>
                            </div>
    
                            <p-fileUpload mode="basic" [disabled]="isDisableUpload" chooseLabel="Chọn ảnh" chooseIcon="pi pi-upload" name="input"
                                [auto]="true" url="{{uploadApi}}" accept="image/*" [maxFileSize]="maxSize"
                                (onUpload)="selectImg($event,'designBack')" />
                        </div>


                        
                        <div class="field col-6">
                            <label htmlFor="mainImg">Sale Design Sleeves </label>
                            <div
                                class="image-zone-upload-boder w-30rem fix-height flex align-items-center justify-content-center mt-1">
                                <lib-image class="image-zone-upload"  [isShowImage]="true"
                                    [src]="getMainImage('saleDesignSleeves')" [imageDefault]="imageDefault">
                                </lib-image>
                            </div>
    
                            <p-fileUpload mode="basic" [disabled]="true" chooseLabel="Chọn ảnh" chooseIcon="pi pi-upload" name="input"
                                [auto]="true" url="{{uploadApi}}" accept="image/*" [maxFileSize]="maxSize"
                                (onUpload)="selectImg($event,'saleDesignSleeves')" />
                        </div>

                        <div class="field col-6">
                            <label htmlFor="mainImg">Design Sleeves</label>
                            <div
                                class="image-zone-upload-boder w-30rem fix-height flex align-items-center justify-content-center mt-1">
                                <lib-image class="image-zone-upload"  [isShowImage]="true"
                                    [src]="getMainImage('designSleeves')" [imageDefault]="imageDefault">
                                </lib-image>
                            </div>
    
                            <p-fileUpload mode="basic" [disabled]="isDisableUpload" chooseLabel="Chọn ảnh" chooseIcon="pi pi-upload" name="input"
                                [auto]="true" url="{{uploadApi}}" accept="image/*" [maxFileSize]="maxSize"
                                (onUpload)="selectImg($event,'designSleeves')" />
                        </div>

                        <div class="field col-6">
                            <label htmlFor="mainImg">Sale Design Hood</label>
                            <div
                                class="image-zone-upload-boder w-30rem fix-height flex align-items-center justify-content-center mt-1">
                                <lib-image class="image-zone-upload"  [isShowImage]="true"
                                    [src]="getMainImage('saleDesignHood')" [imageDefault]="imageDefault">
                                </lib-image>
                            </div>
    
                            <p-fileUpload mode="basic" [disabled]="true" chooseLabel="Chọn ảnh" chooseIcon="pi pi-upload" name="input"
                                [auto]="true" url="{{uploadApi}}" accept="image/*" [maxFileSize]="maxSize"
                                (onUpload)="selectImg($event,'saleDesignHood')" />
                        </div>

                        <div class="field col-6">
                            <label htmlFor="mainImg">Design Hood</label>
                            <div
                                class="image-zone-upload-boder w-30rem fix-height flex align-items-center justify-content-center mt-1">
                                <lib-image class="image-zone-upload"  [isShowImage]="true"
                                    [src]="getMainImage('designHood')" [imageDefault]="imageDefault">
                                </lib-image>
                            </div>
    
                            <p-fileUpload mode="basic" [disabled]="isDisableUpload" chooseLabel="Chọn ảnh" chooseIcon="pi pi-upload" name="input"
                                [auto]="true" url="{{uploadApi}}" accept="image/*" [maxFileSize]="maxSize"
                                (onUpload)="selectImg($event,'designHood')" />
                        </div>

                    </ng-container>

                </div>
            </div>
        </div>
        <!-- <div class="p-dialog-footer custom-dialog-footer">
        <lib-button label="Hủy" iconType="cancel" (onClick)="onClose()"></lib-button>
        <lib-button label="Save" iconType="save"></lib-button>
    </div> -->
    </form>

    <form class="form-wrapper border-form" *ngIf="!hasData">
        <div class="grid m-0 ml-1">
            <div class="col-12 pr-4">
                <div class="b-w-100 flex  justify-content-center  mb-3">
                    <div class="flex-column align-items-center  justify-content-center">
                        <p-image [src]="EImageTable.EMPTY" alt="Image"></p-image>
                        <p> Đơn hàng không tồn tại</p>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
