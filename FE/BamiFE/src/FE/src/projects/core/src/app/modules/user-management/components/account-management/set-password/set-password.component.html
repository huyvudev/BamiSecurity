<form [formGroup]="form">
	<!--  -->
	<input type="password" name="password" class="input-focus"/>
	<!--  -->
	<div class="grid form-style">
		<div class="field col-12">
			<lib-password label="Mật khẩu" formControlName="password" />
		</div>
		<lib-groupButtonSubmit
			[permissionUpdate]="true"
			[isEdit]="true"
			[postForm]="form"
			(cancel)="closeDialog()"
			(submit)="save()"
		/>
	</div>
</form>
