<ng-container>
	<label class="mb-2" [pTooltip]="pTooltipLabel" *ngIf="label"> 
		{{ label }}
		<!-- <span class="required-field" *ngIf="isRequired"> * </span> -->
		<icon-required *ngIf="isRequired || required" />
	</label>
	<!--  -->
    <p-password
        #password 
        [(ngModel)]="value"
        (ngModelChange)="_onChange($event)"
        [inputId]="inputId"
        [disabled]="isDisabled || disabled"
        [toggleMask]="toggleMask"
        [feedback]="feedback" 
        [mediumRegex]="mediumRegex"
        [strongRegex]="strongRegex"
        [weakLabel]="weakLabel" 
        [mediumLabel]="mediumLabel" 
        [strongLabel]="strongLabel" 
        [maxLength]="maxLength"
        [inputStyleClass]="'w-full ' + inputStyleClass"
        [styleClass]="'w-full custom-disabled ' + styleClass"
        [style]="style"
        [inputStyle]="inputStyle"
        [showClear]="showClear"
        [ngClass]="{
			'ng-invalid ng-dirty': ((!controlDir?.control?.pristine || controlDir?.control?.touched) && controlDir?.control?.invalid)
		}"
        (onFocus)="onFocus.emit($event)"
        (onBlur)="onTouched(); onBlur.emit($event)"
        (onClear)="onClear.emit($event)"
    >
        <ng-template pTemplate="header" *ngIf="headerTemplate">
            <ng-container *ngTemplateOutlet="headerTemplate; context: { $implicit: header }"></ng-container>
        </ng-template>
        <ng-template pTemplate="content" *ngIf="contentTemplate">
            <ng-container *ngTemplateOutlet="contentTemplate; context: { $implicit: content }" ></ng-container>
        </ng-template>
        <ng-template pTemplate="footer" *ngIf="footerTemplate">
            <ng-container *ngTemplateOutlet="footerTemplate; context: { $implicit: footer }"></ng-container>
        </ng-template>
    </p-password>
	<!--  -->
    <small *ngIf="controlDir?.control?.touched && controlDir?.control?.invalid && (controlDir?.control?.hasError('errorMessage') || this.control.errors) && isShowMessageInvalid" class="p-error">
		{{ this.control.errors['required'] ? 'Trường bắt buộc nhập' : controlDir?.control?.getError('errorMessage') }}
	</small>
	<!-- <ng-container *ngIf="dynamicRequired">
		{{ setRequired | function :controlDir?.control?.validator }}
	</ng-container> -->
</ng-container>
