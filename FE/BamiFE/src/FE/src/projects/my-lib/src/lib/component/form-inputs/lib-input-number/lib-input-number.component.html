<ng-container>
	<label class="mb-2" [pTooltip]="pTooltipLabel" *ngIf="label"> 
		{{ label }}
		<!-- <span class="required-field" *ngIf="isRequired"> * </span> -->
		<icon-required *ngIf="isRequired || required" />
	</label>
	<!--  -->
    <p-inputNumber
		#inputNumber
		class="w-full"
		styleClass="custom-disabled w-full {{ styleClass }}" 
		[(ngModel)]="value"
		[placeholder]="placeholder"
		[showButtons]="showButtons"
		[inputId]="inputId"
		[style]="style"
		[size]="size"
		[name]="name"
		[required]="required"
		[disabled]="isDisabled || disabled" 
		[autocomplete]="autocomplete"
		[format]="format"
		[incrementButtonClass]="incrementButtonClass"
		[decrementButtonClass]="decrementButtonClass"
		[incrementButtonIcon]="incrementButtonIcon"
		[decrementButtonIcon]="decrementButtonIcon"
		[readonly]="readonly"
		[step]="step"
		[allowEmpty]="allowEmpty"
		[prefix]="prefix"
		[suffix]="suffix"
		[inputStyle]="inputStyle"
		[inputStyleClass]="inputStyleClass"
		[autofocus]="autofocus"
		[showClear]="showClear"
		[localeMatcher]="localeMatcher"
		[mode]="mode"
		[size]="size"
		[tabindex]="tabindex"
        [min]="min" [max]="max" 
        [maxlength]="maxlength"
        [minFractionDigits]="minFractionDigits" 
		[maxFractionDigits]="maxFractionDigits" 
		[locale]="locale"
  		[currency]="currency"
  		[currencyDisplay]="currencyDisplay"
		[useGrouping]="useGrouping"
		[ngClass]="{
			'ng-invalid ng-dirty': controlDir?.control?.touched && controlDir?.control?.invalid
		}"
		(onInput)="onValueChange($event); onInput.emit($event)"
		(onFocus)="onFocus.emit($event); _onKeyDown($event)"
		(onBlur)="onTouched(); onBlur.emit($event)"
		(onKeyDown)="_onKeyDown($event); onKeyDown.emit($event);"
		(onClear)="onClear.emit($event)"
        (paste)="onPaste($event)"
		(click)="_onKeyDown($event)"

	/>
	<!--  -->
    <small *ngIf="controlDir?.control?.touched && controlDir?.control?.invalid && (controlDir?.control?.hasError('errorMessage') || this.control.errors) && isShowMessageInvalid" class="p-error">
		{{ this.control.errors['required'] ? 'Trường bắt buộc nhập' : controlDir?.control?.getError('errorMessage') }}
	</small>
	<!-- <ng-container *ngIf="dynamicRequired">
		{{ setRequired | function :controlDir?.control?.validator }}
	</ng-container> -->
</ng-container>
