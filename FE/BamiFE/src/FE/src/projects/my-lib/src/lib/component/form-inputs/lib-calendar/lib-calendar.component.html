
<ng-container>
    <label class="mb-2" [pTooltip]="pTooltipLabel" *ngIf="label"> 
        {{ label }}
        <!-- <span class="required-field" *ngIf="isRequired"> * </span> -->
		<icon-required *ngIf="isRequired || required" />
    </label>
	<!-- {{ controlDir?.control?.pristine | json }} -->
    <p-calendar
        #calendar
        inputMask [mask]="mask"
        [inputId]="inputId"
        [style]="style"
        [inputStyle]="inputStyle"
        [name]="name"
        [placeholder]="placeholder"
        styleClass="custom-disabled custom-calendar w-full {{ isShowDatepicker ? 'open-datepicker' : '' }} {{ styleClass }} " 
        [(ngModel)]="value" 
        [dateFormat]="dateFormat"
        [showIcon]="showIcon"
        [appendTo]="appendTo"
        [readonlyInput]="readonlyInput"
        [hourFormat]="hourFormat"
        [timeOnly]="timeOnly"
        [stepHour]="stepHour"
        [stepMinute]="stepMinute"
        [stepSecond]="stepSecond"
        [showSeconds]="showSeconds"
        [required]="required"
        [showTime]="showTime"
        [showClear]="showClear"
        [selectionMode]="selectionMode"
        [panelStyleClass]="panelStyleClass"
        [panelStyle]="panelStyle"
        [minDate]="minDate" 
        [maxDate]="maxDate"
        [disabledDates]="disabledDates"
        [disabledDays]="disabledDays"
        [numberOfMonths]="numberOfMonths"
        [defaultDate]="defaultDate"
        [showButtonBar]="showButtonBar"
        [disabled]="isDisabled || disabled"
        [ngClass]="{
			'ng-invalid ng-dirty': controlDir?.control?.touched && controlDir?.control?.invalid && !isShowDatepicker
		}"
        (onFocus)="onFocus.emit($event)"
        (onBlur)="onBlur.emit($event); onTouched()"
        (onSelect)="_onSelect($event);"
        (onClear)="_onClear($event)"
        (onClearClick)="_onClearClick($event)"
        (onInput)="_onInput($event);"
        (onTodayClick)="onTodayClick.emit($event); _onTodayClick($event)"
        (onMonthChange)="onMonthChange.emit($event)"
        (onYearChange)="onYearChange.emit($event)"
        (onClickOutside)="onClickOutside.emit($event);"
        (onShow)="onShow.emit($event); _onShow($event)"
        (onClose)="onClose.emit($event); _onClose($event)"
    >
        <ng-template pTemplate="header" *ngIf="headerTemplate">
            <ng-container *ngTemplateOutlet="headerTemplate; context: {$implicit: header}"></ng-container>
        </ng-template>
        <ng-template pTemplate="footer" *ngIf="footerTemplate">
            <ng-container *ngTemplateOutlet="footerTemplate; context: {$implicit: footer}"></ng-container>
        </ng-template>
        <ng-template pTemplate="date" *ngIf="dateTemplate">
            <ng-container *ngTemplateOutlet="dateTemplate; context: {$implicit: date}"></ng-container>
        </ng-template>
    </p-calendar>
    <small *ngIf="controlDir?.control?.touched && controlDir?.control?.invalid && (controlDir?.control?.hasError('errorMessage') || this.control.errors) && !isShowDatepicker && isShowMessageInvalid" class="p-error">
        {{ this.control.errors['required'] ? 'Trường bắt buộc nhập' : controlDir?.control?.getError('errorMessage') }}
    </small>
    <!--  -->
</ng-container>
